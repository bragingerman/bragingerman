<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Clock</title>
<link rel="stylesheet" href="fapclock.css">
</head>
<body>

<div class="clock-wrap">

  <!-- CLOCK DISPLAY -->
  <div class="clock-row" id="clockRow">
    <!-- Hours -->
    <div class="flip-unit-wrap" id="fu-hours">
      <div class="flip-digit" id="d-h1"></div>
      <div class="flip-digit" id="d-h2"></div>
    </div>
    <div class="colon"><div class="colon-dot"></div><div class="colon-dot"></div></div>
    <!-- Minutes -->
    <div class="flip-unit-wrap" id="fu-mins">
      <div class="flip-digit" id="d-m1"></div>
      <div class="flip-digit" id="d-m2"></div>
    </div>
  </div>

  <!-- AM/PM and Weekday labels -->
  <div class="clock-labels">
    <div class="label-ampm" id="labelAmPm"></div>
    <div class="label-weekday" id="labelWeekday"></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn" id="btn24" onclick="toggle24()">24h</button>
    <button class="ctrl-btn" onclick="goFullscreen()">⛶ Fullscreen</button>

    <!-- THEME PICKER -->
    <div class="theme-picker" id="themePicker"></div>
  </div>
</div>

<script src="fapclock.js"></script>
</body>
</html>
