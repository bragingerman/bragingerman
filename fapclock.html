<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Clock</title>
<meta name="description" content="Beautiful animated flip clock with customizable themes. Perfect for desktop and mobile.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<!-- Theme color for browser UI -->
<meta name="theme-color" content="#f69fdc">
<meta name="msapplication-TileColor" content="#f69fdc">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:title" content="Flip Clock - Beautiful Animated Flip Clock Widget">
<meta property="og:description" content="Beautiful animated flip clock with customizable themes. Perfect for desktop and mobile. Multiple color themes, 12/24 hour format, fullscreen mode.">
<meta property="og:url" content="https://notion.germanbragin.com/fapclock.html">
<meta property="og:site_name" content="German Bragin">
<meta property="og:image" content="https://notion.germanbragin.com/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/png">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@germanbragin">
<meta name="twitter:creator" content="@germanbragin">
<meta name="twitter:title" content="Flip Clock - Beautiful Animated Flip Clock Widget">
<meta name="twitter:description" content="Beautiful animated flip clock with customizable themes. Perfect for desktop and mobile. Multiple color themes, 12/24 hour format, fullscreen mode.">
<meta name="twitter:image" content="https://notion.germanbragin.com/og-image.png">

<!-- Author -->
<meta name="author" content="German Bragin">

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Flip Clock">

<link rel="stylesheet" href="fapclock.css">
</head>
<body>

<div class="clock-wrap">

  <!-- CLOCK DISPLAY -->
  <div class="clock-row" id="clockRow">
    <!-- Hours -->
    <div class="flip-unit-wrap" id="fu-hours">
      <div class="flip-digit" id="d-h1"></div>
      <div class="flip-digit" id="d-h2"></div>
    </div>
    <div class="colon"><div class="colon-dot"></div><div class="colon-dot"></div></div>
    <!-- Minutes -->
    <div class="flip-unit-wrap" id="fu-mins">
      <div class="flip-digit" id="d-m1"></div>
      <div class="flip-digit" id="d-m2"></div>
    </div>
  </div>

  <!-- AM/PM and Weekday labels -->
  <div class="clock-labels">
    <div class="label-ampm" id="labelAmPm"></div>
    <div class="label-weekday" id="labelWeekday"></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn" id="btn24" onclick="toggle24()">24h</button>
    <button class="ctrl-btn" onclick="goFullscreen()">⛶ <span class="btn-text">Fullscreen</span></button>

    <!-- THEME PICKER -->
    <div class="theme-picker" id="themePicker"></div>
  </div>
</div>

<script src="fapclock.js"></script>
</body>
</html>
