<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 Moon Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="widget">
        <!-- Theme toggle button -->
        <button class="theme-toggle" id="btnTheme" onclick="toggleTheme()">☀</button>

        <!-- Moon image -->
        <div class="moon-frame">
            <video class="video-bg" autoplay muted loop playsinline preload="auto">
                <source src="bg.mp4" type="video/mp4">
            </video>
            <img class="moon-image" id="moonImg" src="images/full.png" alt="Moon" />
        </div>

        <!-- Info -->
        <div class="info">
            <div class="date" id="dateDisplay">--/--/----</div>
            <div class="phase" id="phaseDisplay">Loading...</div>
            <div class="zodiac" id="zodiacDisplay">--</div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
