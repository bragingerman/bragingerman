<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Intake</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <div class="header">
    <!-- SVG капля -->
    <svg class="drop-icon" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 2C14 2 3 14.5 3 22.5C3 28.8513 7.92487 34 14 34C20.0751 34 25 28.8513 25 22.5C25 14.5 14 2 14 2Z"
        stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/>
    </svg>
    <span class="title">WATER INTAKE</span>
  </div>

  <div class="counter">
    <strong id="drank">0</strong> / <span id="totalLabel">8</span> glasses
  </div>

  <div class="glasses" id="glasses"></div>

  <div class="settings">
    <label>Goal:</label>
    <input type="number" id="goalInput" min="1" max="20" value="8">
    <label>glasses</label>
    <button class="reset-btn" onclick="resetDay()">Reset</button>
    <button class="reset-btn" id="themeBtn" onclick="toggleTheme()" style="margin-left:6px">☀</button>
  </div>
</div>

<script>
const KEY = 'water_intake_v1';

let state = { drank: 0, goal: 8, date: todayStr() };

function todayStr() {
  const now = new Date();
  return `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY));
    if (d) {
      state = d;
      // сброс если новый день
      if (state.date !== todayStr()) {
        state.drank = 0;
        state.date = todayStr();
      }
    }
  } catch(e) {}
}

function save() {
  localStorage.setItem(KEY, JSON.stringify(state));
}

// SVG стакана: filled = розовый, empty = серый контур
function glassSVG(filled) {
  if (filled) {
    return `<svg viewBox="0 0 40 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- стакан контур -->
      <path d="M6 6 L10 48 H30 L34 6 Z" fill="#f0f0f0" stroke="#d4a0a8" stroke-width="1.5" stroke-linejoin="round"/>
      <!-- вода -->
      <clipPath id="gc">
        <path d="M6 6 L10 48 H30 L34 6 Z"/>
      </clipPath>
      <rect x="5" y="18" width="30" height="32" fill="#e8848e" clip-path="url(#gc)"/>
      <!-- блик -->
      <rect x="10" y="20" width="4" height="22" rx="2" fill="rgba(255,255,255,0.35)"/>
    </svg>`;
  } else {
    return `<svg viewBox="0 0 40 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 6 L10 48 H30 L34 6 Z" fill="#f8f8f8" stroke="#d8d8d8" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>`;
  }
}

function render() {
  const goal = state.goal;
  const drank = Math.min(state.drank, goal);

  document.getElementById('drank').textContent = drank;
  document.getElementById('totalLabel').textContent = goal;
  document.getElementById('goalInput').value = goal;

  const container = document.getElementById('glasses');
  container.innerHTML = '';
  for (let i = 0; i < goal; i++) {
    const btn = document.createElement('button');
    btn.className = 'glass-btn';
    btn.innerHTML = glassSVG(i < drank);
    btn.setAttribute('aria-label', `Glass ${i + 1}`);
    const idx = i;
    btn.onclick = () => toggleGlass(idx);
    container.appendChild(btn);
  }
}

function toggleGlass(idx) {
  // клик по закрашенному — уменьшить до idx, по пустому — заполнить до idx+1
  if (idx < state.drank) {
    state.drank = idx;
  } else {
    state.drank = idx + 1;
  }
  save();
  render();
}

function resetDay() {
  state.drank = 0;
  save();
  render();
}

document.getElementById('goalInput').addEventListener('change', (e) => {
  const val = parseInt(e.target.value);
  if (val >= 1 && val <= 20) {
    state.goal = val;
    if (state.drank > state.goal) state.drank = state.goal;
    save();
    render();
  }
});

// авто-сброс в полночь
function scheduleReset() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  const ms = midnight - now;
  setTimeout(() => {
    state.drank = 0;
    state.date = todayStr();
    save();
    render();
    scheduleReset(); // следующая полночь
  }, ms);
}

let themeOverride = null;

function applyTheme() {
  if (themeOverride) document.documentElement.setAttribute('data-theme', themeOverride);
  else document.documentElement.removeAttribute('data-theme');
}

function updateThemeIcon() {
  const dark = themeOverride === 'dark' ||
    (themeOverride === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = dark ? '☾' : '☀';
}

function toggleTheme() {
  const currentlyDark = themeOverride === 'dark' ||
    (themeOverride === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
  themeOverride = currentlyDark ? 'light' : 'dark';
  applyTheme(); updateThemeIcon();
  try { localStorage.setItem('water_theme', themeOverride); } catch(e) {}
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (!themeOverride) updateThemeIcon();
});

// load theme override
try { themeOverride = localStorage.getItem('water_theme') || null; } catch(e) {}

load();
applyTheme();
updateThemeIcon();
render();
scheduleReset();
</script>
</body>
</html>
